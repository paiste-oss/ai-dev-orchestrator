services:
  backend:
    build: ./backend
    container_name: ai_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./:/project          # Dev Orchestrator: ganzes Projekt für Claude lesbar/schreibbar
      - n8n_data:/n8n_data:ro  # n8n DB read-only für Credential-Entschlüsselung
    environment:
      # Datenbank
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      # Redis / Celery
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      # Qdrant
      - QDRANT_HOST=${QDRANT_HOST:-qdrant}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      # Ollama
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_ROUTER_MODEL=${OLLAMA_ROUTER_MODEL:-phi3}
      - OLLAMA_CHAT_MODEL=${OLLAMA_CHAT_MODEL:-mistral}
      - OLLAMA_CODE_MODEL=${OLLAMA_CODE_MODEL:-llama3.2}
      # KI APIs
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # GitHub
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO:-paiste-oss/ai-dev-orchestrator}
      # n8n
      - N8N_BASE_URL=${N8N_BASE_URL}
      - N8N_API_KEY=${N8N_API_KEY}
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_DEFAULT_CUSTOMER_ID=${N8N_DEFAULT_CUSTOMER_ID}
      - N8N_DEFAULT_BUDDY_ID=${N8N_DEFAULT_BUDDY_ID}
      # Credentials-Verschlüsselung
      - CREDENTIALS_ENCRYPTION_KEY=${CREDENTIALS_ENCRYPTION_KEY}
      # Google OAuth2
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      # URLs
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - PROJECT_ROOT=/project
      # JWT
      - SECRET_KEY=${SECRET_KEY}
      # Stripe Billing
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_BASIS_MONTHLY=${STRIPE_PRICE_BASIS_MONTHLY}
      - STRIPE_PRICE_BASIS_YEARLY=${STRIPE_PRICE_BASIS_YEARLY}
      - STRIPE_PRICE_KOMFORT_MONTHLY=${STRIPE_PRICE_KOMFORT_MONTHLY}
      - STRIPE_PRICE_KOMFORT_YEARLY=${STRIPE_PRICE_KOMFORT_YEARLY}
      - STRIPE_PRICE_PREMIUM_MONTHLY=${STRIPE_PRICE_PREMIUM_MONTHLY}
      - STRIPE_PRICE_PREMIUM_YEARLY=${STRIPE_PRICE_PREMIUM_YEARLY}
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Ollama auf dem Host erreichbar
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    networks:
      - ai_local
      - ai_internal

  celery_worker:
    build: ./backend
    container_name: ai_celery_worker
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
      - ./:/project
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - QDRANT_HOST=${QDRANT_HOST:-qdrant}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_ROUTER_MODEL=${OLLAMA_ROUTER_MODEL:-phi3}
      - OLLAMA_CHAT_MODEL=${OLLAMA_CHAT_MODEL:-mistral}
      - OLLAMA_CODE_MODEL=${OLLAMA_CODE_MODEL:-llama3.2}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO:-paiste-oss/ai-dev-orchestrator}
      - N8N_BASE_URL=${N8N_BASE_URL}
      - N8N_API_KEY=${N8N_API_KEY}
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_DEFAULT_CUSTOMER_ID=${N8N_DEFAULT_CUSTOMER_ID}
      - N8N_DEFAULT_BUDDY_ID=${N8N_DEFAULT_BUDDY_ID}
      - CREDENTIALS_ENCRYPTION_KEY=${CREDENTIALS_ENCRYPTION_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - PROJECT_ROOT=/project
      - SECRET_KEY=${SECRET_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - postgres
    networks:
      - ai_local
      - ai_internal

  celery_beat:
    build: ./backend
    container_name: ai_celery_beat
    command: celery -A tasks.celery_app beat --loglevel=info --schedule=/app/celerybeat-schedule
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - N8N_BASE_URL=${N8N_BASE_URL}
      - N8N_API_KEY=${N8N_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - CREDENTIALS_ENCRYPTION_KEY=${CREDENTIALS_ENCRYPTION_KEY}
    depends_on:
      - redis
    networks:
      - ai_local
      - ai_internal

  frontend:
    build: ./frontend
    container_name: ai_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL}
      - NEXT_PUBLIC_METABASE_URL=${NEXT_PUBLIC_METABASE_URL}
    depends_on:
      - backend
    networks:
      - ai_local
      - ai_external

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - BACKEND_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
      - CUSTOMER_ID=${N8N_DEFAULT_CUSTOMER_ID}
      - BUDDY_ID=${N8N_DEFAULT_BUDDY_ID}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - WEATHER_CITY=${WEATHER_CITY:-Bern}
      - CUSTOMER_REGION=${CUSTOMER_REGION:-Schweiz}
    networks:
      - ai_local
      - ai_external

  # ── Infisical — On-Premise Secrets Manager ──────────────────────────────────
  infisical_db:
    image: postgres:16-alpine
    container_name: infisical_db
    restart: always
    env_file:
      - .env.infisical
    environment:
      POSTGRES_DB: infisical
      POSTGRES_USER: infisical
      POSTGRES_PASSWORD: ${INFISICAL_DB_PASSWORD}
    volumes:
      - infisical_db_data:/var/lib/postgresql/data
    networks:
      - ai_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infisical"]
      interval: 10s
      timeout: 5s
      retries: 5

  infisical:
    image: infisical/infisical:latest-postgres
    container_name: infisical
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env.infisical
    environment:
      NODE_ENV: production
      ENCRYPTION_KEY: ${INFISICAL_ENCRYPTION_KEY}
      AUTH_SECRET: ${INFISICAL_AUTH_SECRET}
      DB_CONNECTION_URI: postgresql://infisical:${INFISICAL_DB_PASSWORD}@infisical_db:5432/infisical
      REDIS_URL: redis://redis:6379/3
      SITE_URL: ${INFISICAL_SITE_URL:-http://localhost:8080}
      TELEMETRY_ENABLED: "false"
    depends_on:
      infisical_db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ai_internal
      - ai_external

  # ── App-Services ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ai_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: aibuddy
      POSTGRES_USER: aibuddy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aibuddy"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai_redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai_internal

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ai_internal

  metabase:
    image: metabase/metabase:latest
    container_name: ai_metabase
    restart: always
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: aibuddy
      MB_DB_PORT: 5432
      MB_DB_USER: aibuddy
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai_internal
      - ai_external

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare_tunnel
    restart: always
    command: "tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}"
    networks:
      - ai_local
      - ai_external

volumes:
  n8n_data:
  postgres_data:
  redis_data:
  qdrant_data:
  infisical_db_data:

networks:
  ai_local:
    driver: bridge
  ai_internal:
    driver: bridge
    internal: true
  ai_external:
    driver: bridge
