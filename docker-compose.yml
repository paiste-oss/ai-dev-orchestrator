services:
  backend:
    build: ./backend
    container_name: ai_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./:/project          # Dev Orchestrator: ganzes Projekt für Claude lesbar/schreibbar
      - n8n_data:/n8n_data:ro  # n8n DB read-only für Credential-Entschlüsselung
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Ollama auf dem Host erreichbar
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    networks:
      - ai_local      # Erreicht Ollama (Host) + alle internen Services
      - ai_internal   # Erreicht Daten-Services (Postgres, Redis, Qdrant)

  celery_worker:
    build: ./backend
    container_name: ai_celery_worker
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
      - ./:/project
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - postgres
    networks:
      - ai_local
      - ai_internal

  celery_beat:
    build: ./backend
    container_name: ai_celery_beat
    command: celery -A tasks.celery_app beat --loglevel=info --schedule=/app/celerybeat-schedule
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - ai_local
      - ai_internal

  frontend:
    build: ./frontend
    container_name: ai_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - ai_local      # SSR-Aufrufe zum Backend
      - ai_external   # Browser-Zugang

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      # Buddy-Sinne: Diese Werte sind in n8n-Workflows via $env.VARIABLE zugänglich
      - BACKEND_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
      - CUSTOMER_ID=${N8N_DEFAULT_CUSTOMER_ID}
      - BUDDY_ID=${N8N_DEFAULT_BUDDY_ID}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - WEATHER_CITY=${WEATHER_CITY:-Bern}
      - CUSTOMER_REGION=${CUSTOMER_REGION:-Schweiz}
    networks:
      - ai_local      # Kann Backend und interne Services erreichen
      - ai_external   # Hat Internetzugang (Email, News, Wetter, APIs)

  postgres:
    image: postgres:16-alpine
    container_name: ai_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: aibuddy
      POSTGRES_USER: aibuddy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai_internal   # Nur für interne Services erreichbar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aibuddy"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai_redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai_internal

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ai_internal

  metabase:
    image: metabase/metabase:latest
    container_name: ai_metabase
    restart: always
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: aibuddy
      MB_DB_PORT: 5432
      MB_DB_USER: aibuddy
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai_internal   # Postgres-Zugang
      - ai_external   # Browser-Zugang

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare_tunnel
    restart: always
    command: "tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}"
    networks:
      - ai_local      # Leitet Traffic ans Backend weiter
      - ai_external   # Verbindung zu Cloudflare-Servern

volumes:
  n8n_data:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  ai_local:
    driver: bridge   # Backend + n8n: Host (Ollama) erreichbar, kein Internet aus Code
  ai_internal:
    driver: bridge
    internal: true   # Daten-Services (DB, Redis, Qdrant): absolut isoliert
  ai_external:
    driver: bridge   # n8n + Frontend: Internetzugang für externe APIs
