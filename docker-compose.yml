services:
  backend:
    build: ./backend
    container_name: ai_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./:/project          # Dev Orchestrator: ganzes Projekt für Claude lesbar/schreibbar
      - n8n_data:/n8n_data:ro  # n8n DB read-only für Credential-Entschlüsselung
    environment:
      # Datenbank
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      # Redis / Celery
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      # Qdrant
      - QDRANT_HOST=${QDRANT_HOST:-qdrant}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      # Ollama
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_ROUTER_MODEL=${OLLAMA_ROUTER_MODEL:-phi3}
      - OLLAMA_CHAT_MODEL=${OLLAMA_CHAT_MODEL:-mistral}
      - OLLAMA_CODE_MODEL=${OLLAMA_CODE_MODEL:-llama3.2}
      # KI APIs
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - EXA_API_KEY=${EXA_API_KEY}
      - UNSPLASH_ACCESS_KEY=${UNSPLASH_ACCESS_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID:-EXAVITQu4vr4xnSDxMaL}
      # AWS Bedrock (EU/Zürich — Daten bleiben in der Schweiz)
      - USE_BEDROCK=${USE_BEDROCK:-false}
      - AWS_BEDROCK_API_KEY=${AWS_BEDROCK_API_KEY}
      - AWS_REGION=${AWS_REGION:-eu-central-2}
      # GitHub
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO:-paiste-oss/ai-dev-orchestrator}
      # n8n
      - N8N_BASE_URL=${N8N_BASE_URL}
      - N8N_API_KEY=${N8N_API_KEY}
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_DEFAULT_CUSTOMER_ID=${N8N_DEFAULT_CUSTOMER_ID}
      - N8N_DEFAULT_BUDDY_ID=${N8N_DEFAULT_BUDDY_ID}
      # Credentials-Verschlüsselung
      - CREDENTIALS_ENCRYPTION_KEY=${CREDENTIALS_ENCRYPTION_KEY}
      # Google OAuth2
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      # URLs
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - PROJECT_ROOT=/project
      # Claude Code Runner
      - RUNNER_SECRET=${RUNNER_SECRET}
      # JWT
      - SECRET_KEY=${SECRET_KEY}
      # Monitoring
      - SENTRY_DSN=${SENTRY_DSN}
      - SENTRY_ORG=${SENTRY_ORG}
      - HEALTH_ALERT_EMAIL=${HEALTH_ALERT_EMAIL}
      # Stripe Billing
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_BASIS_MONTHLY=${STRIPE_PRICE_BASIS_MONTHLY}
      - STRIPE_PRICE_BASIS_YEARLY=${STRIPE_PRICE_BASIS_YEARLY}
      - STRIPE_PRICE_KOMFORT_MONTHLY=${STRIPE_PRICE_KOMFORT_MONTHLY}
      - STRIPE_PRICE_KOMFORT_YEARLY=${STRIPE_PRICE_KOMFORT_YEARLY}
      - STRIPE_PRICE_PREMIUM_MONTHLY=${STRIPE_PRICE_PREMIUM_MONTHLY}
      - STRIPE_PRICE_PREMIUM_YEARLY=${STRIPE_PRICE_PREMIUM_YEARLY}
      # Storage Add-on Stripe Price IDs (recurring monthly)
      - STRIPE_PRICE_STORAGE_10GB=${STRIPE_PRICE_STORAGE_10GB}
      - STRIPE_PRICE_STORAGE_50GB=${STRIPE_PRICE_STORAGE_50GB}
      - STRIPE_PRICE_STORAGE_500GB=${STRIPE_PRICE_STORAGE_500GB}
      # Browserless.io — Web Automation
      - BROWSERLESS_TOKEN=${BROWSERLESS_TOKEN}
      - BROWSERLESS_URL=${BROWSERLESS_URL}
      # Twilio (SMS / 2FA)
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER}
      # Dolibarr ERP
      - DOLIBARR_API_KEY=${DOLIBARR_API_KEY}
      - DOLIBARR_URL=${DOLIBARR_URL:-http://dolibarr/api/index.php}
      - DOLI_DB_PASSWORD=${DOLI_DB_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Ollama auf dem Host erreichbar
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    networks:
      - ai_local
      - ai_internal
      - dolibarr_internal

  celery_worker:
    build: ./backend
    container_name: ai_celery_worker
    restart: always
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
      - ./:/project
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - QDRANT_HOST=${QDRANT_HOST:-qdrant}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_ROUTER_MODEL=${OLLAMA_ROUTER_MODEL:-phi3}
      - OLLAMA_CHAT_MODEL=${OLLAMA_CHAT_MODEL:-mistral}
      - OLLAMA_CODE_MODEL=${OLLAMA_CODE_MODEL:-llama3.2}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - EXA_API_KEY=${EXA_API_KEY}
      - UNSPLASH_ACCESS_KEY=${UNSPLASH_ACCESS_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID:-EXAVITQu4vr4xnSDxMaL}
      - USE_BEDROCK=${USE_BEDROCK:-false}
      - AWS_BEDROCK_API_KEY=${AWS_BEDROCK_API_KEY}
      - AWS_REGION=${AWS_REGION:-eu-central-2}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO:-paiste-oss/ai-dev-orchestrator}
      - N8N_BASE_URL=${N8N_BASE_URL}
      - N8N_API_KEY=${N8N_API_KEY}
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_DEFAULT_CUSTOMER_ID=${N8N_DEFAULT_CUSTOMER_ID}
      - N8N_DEFAULT_BUDDY_ID=${N8N_DEFAULT_BUDDY_ID}
      - CREDENTIALS_ENCRYPTION_KEY=${CREDENTIALS_ENCRYPTION_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - PROJECT_ROOT=/project
      - SECRET_KEY=${SECRET_KEY}
      - SYSTEM_SMTP_HOST=${SYSTEM_SMTP_HOST}
      - SYSTEM_SMTP_PORT=${SYSTEM_SMTP_PORT:-587}
      - SYSTEM_SMTP_USER=${SYSTEM_SMTP_USER}
      - SYSTEM_SMTP_PASSWORD=${SYSTEM_SMTP_PASSWORD}
      - SYSTEM_SMTP_FROM=${SYSTEM_SMTP_FROM:-noreply@baddi.ch}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER}
      - DOLI_DB_PASSWORD=${DOLI_DB_PASSWORD}
      - SENTRY_DSN=${SENTRY_DSN}
      - HEALTH_ALERT_EMAIL=${HEALTH_ALERT_EMAIL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - postgres
    networks:
      - ai_local
      - ai_internal
      - dolibarr_internal

  celery_beat:
    build: ./backend
    container_name: ai_celery_beat
    restart: always
    command: celery -A tasks.celery_app beat --loglevel=info --schedule=/app/celerybeat-schedule
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - N8N_BASE_URL=${N8N_BASE_URL}
      - N8N_API_KEY=${N8N_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - USE_BEDROCK=${USE_BEDROCK:-false}
      - AWS_BEDROCK_API_KEY=${AWS_BEDROCK_API_KEY}
      - AWS_REGION=${AWS_REGION:-eu-central-2}
      - SECRET_KEY=${SECRET_KEY}
      - CREDENTIALS_ENCRYPTION_KEY=${CREDENTIALS_ENCRYPTION_KEY}
    depends_on:
      - redis
    networks:
      - ai_local
      - ai_internal

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - BACKEND_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
      - CUSTOMER_ID=${N8N_DEFAULT_CUSTOMER_ID}
      - BUDDY_ID=${N8N_DEFAULT_BUDDY_ID}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - WEATHER_CITY=${WEATHER_CITY:-Bern}
      - CUSTOMER_REGION=${CUSTOMER_REGION:-Schweiz}
    networks:
      - ai_local
      - ai_external

  postgres:
    image: postgres:16-alpine
    container_name: ai_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: aibuddy
      POSTGRES_USER: aibuddy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aibuddy"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai_redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai_internal

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ai_internal

  dolibarr_db:
    image: mariadb:10.11
    container_name: dolibarr_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DOLI_DB_ROOT_PASSWORD:-changeme_root}
      MYSQL_DATABASE: dolibarr
      MYSQL_USER: dolibarr
      MYSQL_PASSWORD: ${DOLI_DB_PASSWORD:-changeme_doli}
    volumes:
      - dolibarr_db_data:/var/lib/mysql
    networks:
      - dolibarr_internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  dolibarr:
    image: dolibarr/dolibarr:latest
    container_name: dolibarr
    restart: always
    ports:
      - "8080:80"
    environment:
      DOLI_DB_HOST: dolibarr_db
      DOLI_DB_HOST_PORT: 3306
      DOLI_DB_NAME: dolibarr
      DOLI_DB_USER: dolibarr
      DOLI_DB_PASSWORD: ${DOLI_DB_PASSWORD:-changeme_doli}
      DOLI_ADMIN_LOGIN: ${DOLI_ADMIN_LOGIN:-admin}
      DOLI_ADMIN_PASSWORD: ${DOLI_ADMIN_PASSWORD:-changeme_admin}
      DOLI_URL_ROOT: ${DOLI_URL_ROOT:-http://localhost:8080}
      DOLI_INSTANCE_UNIQUE_ID: ${DOLI_INSTANCE_UNIQUE_ID:-baddi_erp}
      WWW_USER_ID: 33
      WWW_GROUP_ID: 33
    volumes:
      - dolibarr_data:/var/www/html/documents
    depends_on:
      dolibarr_db:
        condition: service_healthy
    networks:
      - dolibarr_internal
      - ai_local
      - ai_external

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare_tunnel
    restart: always
    command: "tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}"
    networks:
      - ai_local
      - ai_external

volumes:
  n8n_data:
  postgres_data:
  redis_data:
  qdrant_data:
  dolibarr_data:
  dolibarr_db_data:

networks:
  ai_local:
    driver: bridge
  ai_internal:
    driver: bridge
    internal: true
  ai_external:
    driver: bridge
  dolibarr_internal:
    driver: bridge
    internal: true
