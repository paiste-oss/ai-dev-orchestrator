<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Baddi Avatar</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }

    #stage {
      width: 100%;
      height: calc(100% - 28px);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    /* ── Robot ──────────────────────────────── */
    model-viewer {
      width: 100%; height: 100%;
      background-color: transparent;
      --progress-bar-color: transparent;
      --progress-mask: transparent;
    }

    /* ── Teekanne ───────────────────────────── */
    #tk-root { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .tk-svg-wrap { position: relative; }

    @keyframes lidBounce {
      0%,100% { transform: translateY(0) rotate(-2deg); }
      50%      { transform: translateY(-9px) rotate(4deg); }
    }
    @keyframes bodyWobble {
      0%,100% { transform: rotate(0deg); }
      30%     { transform: rotate(-3deg); }
      70%     { transform: rotate(3deg); }
    }
    @keyframes mouthTalk {
      0%,100% { transform: scaleY(1); }
      50%     { transform: scaleY(0.15); }
    }
    @keyframes eyeBlink {
      0%,88%,100% { transform: scaleY(1); }
      94%          { transform: scaleY(0.08); }
    }
    @keyframes steamUp {
      0%   { transform: translateY(0) scale(0.6); opacity: 0; }
      25%  { opacity: 0.65; }
      100% { transform: translateY(-38px) scale(1.6); opacity: 0; }
    }

    .tk-body-g    { transform-origin: 100px 135px; animation: bodyWobble 2.2s ease-in-out infinite; }
    .tk-body-g.sp { animation: bodyWobble 0.35s ease-in-out infinite; }
    .tk-lid-g     { transform-origin: 100px 92px; }
    .tk-lid-g.sp  { animation: lidBounce 0.3s ease-in-out infinite; }
    .tk-eye       { animation: eyeBlink 5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .tk-eye:nth-child(2) { animation-delay: 0.12s; }
    .tk-mouth     { transform-box: fill-box; transform-origin: center; }
    .tk-mouth.sp  { animation: mouthTalk 0.18s ease-in-out infinite; }

    .steam-wrap { position: absolute; pointer-events: none; }
    .sp-puff {
      position: absolute; border-radius: 50%;
      background: rgba(210,210,255,0.55);
      animation: steamUp 1.9s ease-out infinite;
    }

    /* ── Lichtgestalt ──────────────────────── */
    #licht-canvas { display: block; }

    /* ── Speaking dot ─────────────────────── */
    #speaking-dot {
      display: none; position: fixed; bottom: 33px; right: 7px;
      width: 9px; height: 9px; border-radius: 50%;
      background: #34d399; box-shadow: 0 0 6px 2px rgba(52,211,153,0.55);
      animation: dotPulse 1s ease-in-out infinite;
    }
    #speaking-dot.on { display: block; }
    @keyframes dotPulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%     { opacity: 0.35; transform: scale(1.45); }
    }

    /* ── Selector ─────────────────────────── */
    #selector {
      height: 28px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .av-btn {
      padding: 0 8px; height: 20px; border-radius: 99px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.38); font-size: 13px;
      cursor: pointer; transition: background 0.18s, color 0.18s, border-color 0.18s;
      line-height: 18px;
    }
    .av-btn:hover  { background: rgba(255,255,255,0.11); color: rgba(255,255,255,0.75); }
    .av-btn.active { background: rgba(255,255,255,0.17); color: white; border-color: rgba(255,255,255,0.32); }
  </style>
</head>
<body>

<div id="stage"></div>
<div id="speaking-dot"></div>
<div id="selector">
  <button class="av-btn" data-av="robot"       title="Roboter">🤖</button>
  <button class="av-btn" data-av="teekanne"    title="Teekanne">🫖</button>
  <button class="av-btn" data-av="lichtgestalt" title="Lichtgestalt">✨</button>
</div>

<script>
// ── Config ──────────────────────────────────────────────
const ALLOWED_ORIGINS = [
  "https://www.baddi.ch", "https://baddi.ch",
  "http://localhost:3000", "http://localhost:3001",
];

const ROBOT_ANIM = {
  freudig:      "Wave",
  nachdenklich: "Idle",
  traurig:      "Sitting",
  überrascht:   "Jump",
  ruhig:        "Idle",
  aufmunternd:  "ThumbsUp",
  neugierig:    "Idle",
  empathisch:   "Yes",
};

const TEAPOT_EMOTION = {
  freudig:      { fill: "#a855f7", mouthOpen: 9  },
  nachdenklich: { fill: "#6366f1", mouthOpen: 1  },
  traurig:      { fill: "#64748b", mouthOpen: -8 },
  überrascht:   { fill: "#ec4899", mouthOpen: 14 },
  ruhig:        { fill: "#8b5cf6", mouthOpen: 4  },
  aufmunternd:  { fill: "#f97316", mouthOpen: 11 },
  neugierig:    { fill: "#7c3aed", mouthOpen: 7  },
  empathisch:   { fill: "#e879f9", mouthOpen: 8  },
};

const LICHT_HSL = {
  freudig:      [45,  92, 65],
  nachdenklich: [220, 72, 60],
  traurig:      [232, 32, 48],
  überrascht:   [282, 85, 70],
  ruhig:        [178, 58, 55],
  aufmunternd:  [28,  96, 62],
  neugierig:    [268, 65, 64],
  empathisch:   [328, 72, 65],
};

// ── State ────────────────────────────────────────────────
let currentAvatar  = new URLSearchParams(location.search).get("avatar") ?? "robot";
let currentEmotion = "ruhig";
let currentSpeaking = false;
let lichtRAF = null;

const stage = document.getElementById("stage");
const dot   = document.getElementById("speaking-dot");

// ── Robot ────────────────────────────────────────────────
function buildRobot() {
  const mv = document.createElement("model-viewer");
  mv.id = "mv";
  mv.setAttribute("src", "https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb");
  mv.setAttribute("animation-name", "Idle");
  mv.setAttribute("autoplay", "");
  mv.setAttribute("camera-controls", "false");
  mv.setAttribute("disable-zoom", "");
  mv.setAttribute("disable-pan", "");
  mv.setAttribute("interaction-prompt", "none");
  mv.setAttribute("camera-orbit", "0deg 80deg 5m");
  mv.setAttribute("field-of-view", "30deg");
  mv.setAttribute("shadow-intensity", "0");
  return mv;
}

let robotIdleTimer = null;
function updateRobot(emotion) {
  const mv = document.getElementById("mv");
  if (!mv || !emotion) return;
  const anim = ROBOT_ANIM[emotion] ?? "Idle";
  mv.setAttribute("animation-name", anim);
  clearTimeout(robotIdleTimer);
  robotIdleTimer = setTimeout(() => mv.setAttribute("animation-name", "Idle"), 3000);
}

// ── Teekanne ─────────────────────────────────────────────
function buildTeekanne() {
  const root = document.createElement("div");
  root.id = "tk-root";

  // Steam puffs
  const steam = `
    <div class="steam-wrap" style="top:6px;left:62%">
      <div class="sp-puff" style="width:10px;height:10px;left:0;top:0;animation-delay:0s"></div>
      <div class="sp-puff" style="width:7px;height:7px;left:13px;top:3px;animation-delay:0.55s"></div>
      <div class="sp-puff" style="width:8px;height:8px;left:-8px;top:4px;animation-delay:1.1s"></div>
    </div>`;

  root.innerHTML = `
    <div class="tk-svg-wrap" style="position:relative;width:90%;max-width:180px;aspect-ratio:1">
      ${steam}
      <svg id="tk-svg" viewBox="0 0 200 210" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
        <!-- Boden-Schatten -->
        <ellipse cx="100" cy="200" rx="55" ry="7" fill="rgba(0,0,0,0.18)"/>

        <!-- Griff -->
        <path d="M42,110 C16,112 14,152 42,157"
          stroke="#9333ea" stroke-width="14" fill="none" stroke-linecap="round"/>

        <!-- Körper-Gruppe (wackelt) -->
        <g class="tk-body-g" id="tk-body-g">
          <ellipse id="tk-body-fill" cx="100" cy="138" rx="63" ry="53" fill="#7c3aed"/>
          <!-- Innen-Schimmer -->
          <ellipse cx="100" cy="138" rx="56" ry="46" fill="#a78bfa" opacity="0.22"/>
          <!-- Glanz oben links -->
          <ellipse cx="80" cy="114" rx="14" ry="7" fill="rgba(255,255,255,0.18)" transform="rotate(-20,80,114)"/>
        </g>

        <!-- Tülle -->
        <path d="M161,120 C180,110 186,90 180,74"
          stroke="#9333ea" stroke-width="14" fill="none" stroke-linecap="round"/>
        <circle cx="180" cy="72" r="5" fill="#a78bfa"/>

        <!-- Deckel -->
        <g class="tk-lid-g" id="tk-lid-g">
          <ellipse cx="100" cy="94" rx="43" ry="11" fill="#6d28d9"/>
          <ellipse cx="100" cy="91" rx="39" ry="9" fill="#7c3aed"/>
          <ellipse cx="100" cy="82" rx="17" ry="10" fill="#6d28d9"/>
          <circle  cx="100" cy="73" r="8" fill="#8b5cf6"/>
        </g>

        <!-- Gesicht -->
        <!-- Auge links -->
        <g class="tk-eye">
          <ellipse cx="83" cy="136" rx="8.5" ry="9.5" fill="white"/>
          <circle  cx="85" cy="136" r="4.5" fill="#1a0045"/>
          <circle  cx="86.5" cy="134" r="1.5" fill="white"/>
        </g>
        <!-- Auge rechts -->
        <g class="tk-eye">
          <ellipse cx="117" cy="136" rx="8.5" ry="9.5" fill="white"/>
          <circle  cx="119" cy="136" r="4.5" fill="#1a0045"/>
          <circle  cx="120.5" cy="134" r="1.5" fill="white"/>
        </g>

        <!-- Mund -->
        <ellipse id="tk-mouth" class="tk-mouth" cx="100" cy="155" rx="12" ry="6" fill="white"/>
      </svg>
    </div>`;

  return root;
}

function updateTeekanne(emotion, speaking) {
  const bodyG  = document.getElementById("tk-body-g");
  const lidG   = document.getElementById("tk-lid-g");
  const bodyFill = document.getElementById("tk-body-fill");
  const mouth  = document.getElementById("tk-mouth");
  if (!bodyG) return;

  bodyG.classList.toggle("sp", speaking);
  lidG.classList.toggle("sp", speaking);
  mouth.classList.toggle("sp", speaking);

  const e = TEAPOT_EMOTION[emotion] ?? TEAPOT_EMOTION.ruhig;

  // Körperfarbe
  if (bodyFill) bodyFill.setAttribute("fill", e.fill);

  // Mundform: öffnen/schließen je Emotion
  const ry = Math.max(2, 6 + (e.mouthOpen - 4) * 0.4);
  mouth.setAttribute("ry", String(ry));
}

// ── Lichtgestalt ─────────────────────────────────────────
let lichtState = { emotion: "ruhig", speaking: false };

function buildLichtgestalt() {
  const canvas = document.createElement("canvas");
  canvas.id = "licht-canvas";
  const W = stage.offsetWidth  || 200;
  const H = stage.offsetHeight || 200;
  canvas.width  = W;
  canvas.height = H;
  canvas.style.width  = W + "px";
  canvas.style.height = H + "px";

  const ctx = canvas.getContext("2d");
  let t = 0;

  // Partikel-Ring
  const N = 45;
  const parts = Array.from({ length: N }, (_, i) => ({
    angle : (i / N) * Math.PI * 2 + Math.random() * 0.3,
    r     : 38 + Math.random() * 32,
    speed : 0.004 + Math.random() * 0.009,
    size  : 1.2 + Math.random() * 2.8,
    op    : 0.3 + Math.random() * 0.55,
    layer : i % 3,
  }));

  function draw() {
    const { emotion, speaking } = lichtState;
    const [h, s, l] = LICHT_HSL[emotion] ?? [200, 60, 60];
    const spd   = speaking ? 2.6 : 1;
    const pulse = 1 + 0.14 * Math.sin(t * (speaking ? 6.5 : 2));

    ctx.clearRect(0, 0, W, H);
    const cx = W / 2, cy = H / 2;

    // Äusserer Glanz (mehrere Ringe)
    for (let i = 4; i >= 1; i--) {
      const gr = 65 * pulse * i * 0.45;
      const ga = (0.055 / i) * (1 + 0.28 * Math.sin(t * 1.3));
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, gr);
      g.addColorStop(0, `hsla(${h},${s}%,${l}%,${ga * 3.5})`);
      g.addColorStop(1, `hsla(${h},${s}%,${l}%,0)`);
      ctx.beginPath(); ctx.arc(cx, cy, gr, 0, Math.PI * 2);
      ctx.fillStyle = g; ctx.fill();
    }

    // Partikel
    parts.forEach(p => {
      p.angle += p.speed * spd * (1 + p.layer * 0.25);
      const pr = p.r * pulse * (0.78 + p.layer * 0.18);
      const x  = cx + Math.cos(p.angle) * pr;
      const y  = cy + Math.sin(p.angle) * pr * 0.72;
      ctx.beginPath();
      ctx.arc(x, y, p.size * (speaking ? 1.35 : 1), 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${h + 18},${s}%,${Math.min(l + 22, 94)}%,${p.op})`;
      ctx.fill();
    });

    // Kern-Orb
    const cr  = 22 * pulse;
    const cg  = ctx.createRadialGradient(cx, cy, 0, cx, cy, cr);
    cg.addColorStop(0,   `hsla(${h},${s}%,${Math.min(l + 32, 96)}%,1)`);
    cg.addColorStop(0.55, `hsla(${h},${s}%,${l}%,0.7)`);
    cg.addColorStop(1,    `hsla(${h},${s}%,${l}%,0)`);
    ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI * 2);
    ctx.fillStyle = cg; ctx.fill();

    // Gesicht
    const eyeBase = `hsla(${h},${s}%,${Math.min(l + 38, 97)}%,0.92)`;
    if (!speaking) {
      // Augen: zwei kleine Licht-Punkte
      ctx.fillStyle = eyeBase;
      ctx.beginPath(); ctx.arc(cx - 9, cy - 5, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 9, cy - 5, 2.5, 0, Math.PI * 2); ctx.fill();
      // Lächeln
      ctx.beginPath();
      ctx.arc(cx, cy + 4, 8, 0.15 * Math.PI, 0.85 * Math.PI);
      ctx.strokeStyle = eyeBase; ctx.lineWidth = 2; ctx.stroke();
    } else {
      // Sprechender Mund: wellenförmig
      ctx.beginPath();
      ctx.moveTo(cx - 11, cy + 8);
      for (let i = 0; i <= 22; i++) {
        ctx.lineTo(cx - 11 + i, cy + 8 + Math.sin((i / 3.5) + t * 9) * 3);
      }
      ctx.strokeStyle = eyeBase; ctx.lineWidth = 2.2; ctx.stroke();
    }

    t += 0.022;
    lichtRAF = requestAnimationFrame(draw);
  }

  draw();
  return canvas;
}

// ── Switch Avatar ────────────────────────────────────────
function switchAvatar(type) {
  if (lichtRAF) { cancelAnimationFrame(lichtRAF); lichtRAF = null; }
  clearTimeout(robotIdleTimer);
  stage.innerHTML = "";
  currentAvatar = type;
  localStorage.setItem("baddi_avatar", type);

  document.querySelectorAll(".av-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.av === type)
  );

  // Parent über Wahl informieren (für Backend-Speicherung)
  try { window.parent.postMessage({ type: "baddi_avatar_selected", avatar: type }, "*"); } catch (_) {}

  if (type === "robot") {
    stage.appendChild(buildRobot());
    // Emotion nach load-event setzen
    setTimeout(() => updateRobot(currentEmotion), 1500);
  } else if (type === "teekanne") {
    stage.appendChild(buildTeekanne());
    updateTeekanne(currentEmotion, currentSpeaking);
  } else if (type === "lichtgestalt") {
    lichtState = { emotion: currentEmotion, speaking: currentSpeaking };
    stage.appendChild(buildLichtgestalt());
  }
}

// ── Apply Emotion/Speaking ───────────────────────────────
function apply(emotion, speaking) {
  currentEmotion  = emotion  ?? "ruhig";
  currentSpeaking = speaking ?? false;
  dot.classList.toggle("on", currentSpeaking);

  if (currentAvatar === "robot") {
    updateRobot(currentEmotion);
  } else if (currentAvatar === "teekanne") {
    updateTeekanne(currentEmotion, currentSpeaking);
  } else if (currentAvatar === "lichtgestalt") {
    lichtState.emotion  = currentEmotion;
    lichtState.speaking = currentSpeaking;
  }
}

// ── postMessage ──────────────────────────────────────────
window.addEventListener("message", e => {
  if (!ALLOWED_ORIGINS.includes(e.origin)) return;
  if (e.data?.type !== "baddi_emotion") return;
  apply(e.data.emotion ?? null, e.data.speaking ?? false);
});

// ── Selector ─────────────────────────────────────────────
document.querySelectorAll(".av-btn").forEach(btn =>
  btn.addEventListener("click", () => switchAvatar(btn.dataset.av))
);

// ── Init ─────────────────────────────────────────────────
switchAvatar(currentAvatar);
</script>
</body>
</html>
