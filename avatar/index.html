<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baddi Avatar</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }

      model-viewer {
        width: 100%;
        height: 100%;
        background-color: transparent;
        --progress-bar-color: transparent;
        --progress-mask: transparent;
      }

      #speaking-dot {
        display: none;
        position: fixed;
        bottom: 12px;
        right: 12px;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #34d399;
        box-shadow: 0 0 8px 3px rgba(52,211,153,0.6);
        animation: pulse 1s ease-in-out infinite;
      }
      #speaking-dot.visible { display: block; }

      #emotion-label {
        display: none;
        position: fixed;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        font-family: system-ui, sans-serif;
        font-size: 11px;
        color: rgba(255,255,255,0.6);
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.12);
        padding: 2px 10px;
        border-radius: 99px;
      }
      #emotion-label.visible { display: block; }

      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.3); }
      }
    </style>
  </head>
  <body>
    <model-viewer
      id="avatar"
      src="https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb"
      animation-name="Idle"
      autoplay
      camera-controls="false"
      disable-zoom
      disable-pan
      interaction-prompt="none"
      camera-orbit="0deg 80deg 2.5m"
      field-of-view="30deg"
      shadow-intensity="0"
    ></model-viewer>

    <div id="speaking-dot"></div>
    <div id="emotion-label"></div>

    <script>
      // Emotion → Animation + Label
      const EMOTION_ANIM = {
        freudig:      { anim: "Wave",     label: "😊 freudig" },
        nachdenklich: { anim: "Idle",     label: "🤔 nachdenklich" },
        traurig:      { anim: "Sitting",  label: "🥺 traurig" },
        überrascht:   { anim: "Jump",     label: "😮 überrascht" },
        ruhig:        { anim: "Idle",     label: "😌 ruhig" },
        aufmunternd:  { anim: "ThumbsUp", label: "😄 aufmunternd" },
        neugierig:    { anim: "Idle",     label: "🧐 neugierig" },
        empathisch:   { anim: "Yes",      label: "🤗 empathisch" },
      };

      const ALLOWED_ORIGINS = [
        "https://www.baddi.ch",
        "https://baddi.ch",
        "http://localhost:3000",
        "http://localhost:3001",
      ];

      const viewer = document.getElementById("avatar");
      const dot    = document.getElementById("speaking-dot");
      const label  = document.getElementById("emotion-label");

      let idleTimer = null;

      function setEmotion(emotion) {
        const entry = EMOTION_ANIM[emotion];
        if (!entry) return;

        // Animation wechseln
        viewer.setAttribute("animation-name", entry.anim);

        // Label zeigen
        label.textContent = entry.label;
        label.classList.add("visible");

        // Nach 3s zurück zu Idle
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => {
          viewer.setAttribute("animation-name", "Idle");
          label.classList.remove("visible");
        }, 3000);
      }

      window.addEventListener("message", (e) => {
        if (!ALLOWED_ORIGINS.includes(e.origin)) return;
        if (e.data?.type !== "baddi_emotion") return;

        if (e.data.emotion) setEmotion(e.data.emotion);

        // Speaking-Indikator
        if (e.data.speaking) {
          dot.classList.add("visible");
        } else {
          dot.classList.remove("visible");
        }
      });
    </script>
  </body>
</html>
